<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>paper crop</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<main>
  <h1>paper crop</h1>
  <p class="desc" id="mainDesc">画像を四角形で切り抜くツール。上下左右のエッジ形状を個別に指定できる。</p>
  <input type="file" id="fileInput" accept="image/*" hidden>

  <div class="panel">
    <p class="desc" id="sourceDesc">画像上でドラッグして切り抜き範囲を指定する。余白上でドラッグしても、選択領域は画像を越えない。</p>
    <div class="row upload-actions">
      <button id="newUploadBtn" class="secondary">新規アップロード</button>
      <button id="pasteUploadBtn" class="secondary">クリップボードから貼り付け</button>
      <button id="resetBtn" class="secondary">リセット</button>
    </div>
    <div class="canvas-wrap source-dropzone" id="srcDropZone" tabindex="0" role="button" aria-label="画像をアップロード">
      <canvas id="srcCanvas"></canvas>
      <div id="srcHint" class="src-hint">ここをクリック / ドロップで画像をアップロード</div>
    </div>
    <p class="desc selection-hint" id="selectionHint">画像をアップロードして開始してください。</p>
  </div>

  <div class="panel">
    <div class="controls-block">
      <select id="edgeTop" class="visually-hidden">
        <option value="straight">直線</option>
        <option value="torn">紙を破った風</option>
        <option value="deckle">手漉き紙風</option>
        <option value="wavy">たわみ紙風</option>
        <option value="stamp">半券ミシン目風</option>
      </select>
      <select id="edgeRight" class="visually-hidden">
        <option value="straight">直線</option>
        <option value="torn">紙を破った風</option>
        <option value="deckle">手漉き紙風</option>
        <option value="wavy">たわみ紙風</option>
        <option value="stamp">半券ミシン目風</option>
      </select>
      <select id="edgeBottom" class="visually-hidden">
        <option value="straight">直線</option>
        <option value="torn">紙を破った風</option>
        <option value="deckle">手漉き紙風</option>
        <option value="wavy">たわみ紙風</option>
        <option value="stamp">半券ミシン目風</option>
      </select>
      <select id="edgeLeft" class="visually-hidden">
        <option value="straight">直線</option>
        <option value="torn">紙を破った風</option>
        <option value="deckle">手漉き紙風</option>
        <option value="wavy">たわみ紙風</option>
        <option value="stamp">半券ミシン目風</option>
      </select>

      <div class="edge-picker-header">
        <div>
          <div class="control-title" id="edgeCenterLabel">エッジ形状</div>
          <p class="control-help" id="edgeHelp">見本を選んでから、上右下左のどこに適用するかを指定します。</p>
        </div>
      </div>

      <div class="edge-gallery" id="edgeGallery" role="radiogroup" aria-label="エッジ形状一覧">
        <button type="button" class="edge-card" data-mode="straight" role="radio" aria-checked="false">
          <canvas class="edge-card-canvas" width="140" height="88" aria-hidden="true"></canvas>
          <span class="edge-card-name" data-i18n="edgeStraight">直線</span>
          <span class="edge-card-desc" data-i18n="edgeStraightDesc">まっすぐ切ったような整った縁。</span>
        </button>
        <button type="button" class="edge-card" data-mode="torn" role="radio" aria-checked="false">
          <canvas class="edge-card-canvas" width="140" height="88" aria-hidden="true"></canvas>
          <span class="edge-card-name" data-i18n="edgeTorn">紙を破った風</span>
          <span class="edge-card-desc" data-i18n="edgeTornDesc">大きく荒い破れ跡が残るラフな縁。</span>
        </button>
        <button type="button" class="edge-card" data-mode="deckle" role="radio" aria-checked="false">
          <canvas class="edge-card-canvas" width="140" height="88" aria-hidden="true"></canvas>
          <span class="edge-card-name" data-i18n="edgeDeckle">手漉き紙風</span>
          <span class="edge-card-desc" data-i18n="edgeDeckleDesc">細かく柔らかな紙耳が続く上品な縁。</span>
        </button>
        <button type="button" class="edge-card" data-mode="wavy" role="radio" aria-checked="false">
          <canvas class="edge-card-canvas" width="140" height="88" aria-hidden="true"></canvas>
          <span class="edge-card-name" data-i18n="edgeWavy">たわみ紙風</span>
          <span class="edge-card-desc" data-i18n="edgeWavyDesc">湿りで少したわんだようなゆるいうねり。</span>
        </button>
        <button type="button" class="edge-card" data-mode="stamp" role="radio" aria-checked="false">
          <canvas class="edge-card-canvas" width="140" height="88" aria-hidden="true"></canvas>
          <span class="edge-card-name" data-i18n="edgeStamp">半券ミシン目風</span>
          <span class="edge-card-desc" data-i18n="edgeStampDesc">半券を切り離した後のような反復ノッチ。</span>
        </button>
      </div>

      <div class="edge-cross" id="edgeAssignment">
        <button type="button" class="edge-assign edge-top" data-edge="top">
          <span class="edge-assign-label" id="edgeTopLabel">上エッジ</span>
          <span class="edge-assign-value" data-edge-value="top"></span>
        </button>
        <button type="button" id="applyAllEdgesBtn" class="secondary edge-apply-all">全辺に適用</button>
        <button type="button" class="edge-assign edge-right" data-edge="right">
          <span class="edge-assign-label" id="edgeRightLabel">右エッジ</span>
          <span class="edge-assign-value" data-edge-value="right"></span>
        </button>
        <button type="button" class="edge-assign edge-bottom" data-edge="bottom">
          <span class="edge-assign-label" id="edgeBottomLabel">下エッジ</span>
          <span class="edge-assign-value" data-edge-value="bottom"></span>
        </button>
        <button type="button" class="edge-assign edge-left" data-edge="left">
          <span class="edge-assign-label" id="edgeLeftLabel">左エッジ</span>
          <span class="edge-assign-value" data-edge-value="left"></span>
        </button>
        <div class="edge-center edge-selection-summary" id="selectedEdgeCard">
          <span class="edge-center-title" id="selectedEdgeTitle">選択中</span>
          <span class="edge-center-name" id="selectedEdgeName">直線</span>
          <span class="edge-center-desc" id="selectedEdgeDesc">まっすぐ切ったような整った縁。</span>
        </div>
      </div>

      <div class="roughness-row">
        <label><span id="roughnessLabel">エッジ強度</span>: <input type="range" id="roughness" min="2" max="20" step="1" value="8"></label>
      </div>

      <div class="row effect-options">
        <label><input type="checkbox" id="outlineEnabled" checked> <span id="outlineLabel">輪郭線</span></label>
        <label><input type="checkbox" id="shadowEnabled" checked> <span id="shadowLabel">ドロップシャドウ</span></label>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="row">
      <button id="cropBtn" disabled>Crop</button>
      <button id="downloadBtn" class="secondary" disabled>Download PNG</button>
      <button id="copyBtn" class="secondary" disabled>Copy to clipboard</button>
    </div>
    <p class="status-message" id="statusMessage" role="status" aria-live="polite" hidden></p>
    <div class="canvas-wrap preview-wrap" style="margin-top:12px;"><canvas id="outCanvas"></canvas></div>
  </div>

</main>

<script src="edge-mask.js"></script>
<script src="ui-state.js"></script>
<script src="app.js"></script>
</body>
</html>
